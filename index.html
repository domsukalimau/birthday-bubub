<!DOCTYPE html>
<html>
<head>
    <title>NAH SURAT LOPLOP</title>

    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial;

            /* 🌸 soft pink background */
            background: linear-gradient(135deg, #ffd1dc, #ffe6f0);
            overflow: hidden;
        }

        /* 💖 floating hearts background */
        .heart {
            position: absolute;
            color: #ff4d6d;
            font-size: 18px;
            animation: float 6s infinite ease-in-out;
            opacity: 0.7;
        }

        @keyframes float {
            0% { transform: translateY(0); }
            50% { transform: translateY(-120px); }
            100% { transform: translateY(0); }
        }

        /* 💌 envelope */
        .envelope {
            width: 260px;
            height: 170px;
            background: #ff4d6d;
            border-radius: 12px;
            position: relative;
            cursor: pointer;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            animation: popIn 1s ease;
        }

        @keyframes popIn {
            from { transform: scale(0); }
            to { transform: scale(1); }
        }

        /* flap effect */
        .flap {
            position: absolute;
            top: 0;
            left: 0;
            width: 0;
            height: 0;
            border-left: 130px solid transparent;
            border-right: 130px solid transparent;
            border-top: 90px solid #ff3355;
            transform-origin: top;
            transition: 0.5s;
        }

        .envelope.open .flap {
            transform: rotateX(180deg);
        }

        /* 📜 letter */
        .letter {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(60px);
            width: 200px;
            background: white;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            opacity: 0;
            transition: 0.6s ease;
        }

        .letter.show {
            transform: translateX(-50%) translateY(-140px);
            opacity: 1;
        }

        h3 {
            color: #ff4d6d;
        }

        textarea {
            width: 100%;
            height: 80px;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 5px;
            resize: none;
        }

    </style>
</head>

<body>

<!-- 💖 hearts background -->
<script>
for (let i = 0; i < 20; i++) {
    let h = document.createElement("div");
    h.classList.add("heart");
    h.innerHTML = "<3";
    h.style.left = Math.random() * 100 + "vw";
    h.style.top = Math.random() * 100 + "vh";
    h.style.animationDuration = (3 + Math.random() * 5) + "s";
    document.body.appendChild(h);
}
</script>

<!-- <33 envelope -->
<div class="envelope" id="env" onclick="openEnvelope()">
    <div class="flap"></div>

    <!-- 📜 letter inside -->
    <div class="letter" id="letter">
        <h3><3 happy brithday cintakuu</h3>

        <!-- ✏️ UCAPAN BOLEH EDIT -->
        <textarea id="msg">hepi brithday cintakuu , cemoga sehat selalu panjang umut murah rezekinya . loveyou sayangku !!<3</textarea>
    </div>
</div>

<script>
function openEnvelope() {
    document.getElementById("env").classList.add("open");
    document.getElementById("letter").classList.add("show");
}
</script>

</body>
</html>
